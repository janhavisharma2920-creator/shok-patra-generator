<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शोक पत्र - आमंत्रण पत्र निर्माता</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
            color: #111827;
            margin-bottom: 25px;
        }

        .setup-box {
            background: #fffbeb;
            border: 2px dashed #f59e0b;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .toggle-group {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }

        .control-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .control-item label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .control-item input[type="range"] {
            width: 100%;
        }

        .preview-container {
            width: 100%;
            overflow: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 25px;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-download { background-color: #2563eb; color: white; }
        .btn-download:hover { background-color: #1d4ed8; }
        .btn-whatsapp { background-color: #25d366; color: white; }
        .btn-whatsapp:hover { background-color: #20ba5a; }
        .btn-bake { background-color: #059669; color: white; width: 100%; margin-top: 15px; display: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>शोक पत्र - आमंत्रण पत्र निर्माता</h1>

    <!-- ONE TIME WIZARD: Shows up only if image data is empty -->
    <div id="setupWizard" class="setup-box">
        <h3>✨ वन-टाइम सेटअप (One-Time Setup) ✨</h3>
        <p>अपनी शोक पत्र वाली फोटो को यहाँ सेलेक्ट करें, यह उसे हमेशा के लिए इस पेज के अंदर डाल देगा।</p>
        <input type="file" id="imageBakerInput" accept="image/*">
        <button id="bakeBtn" class="btn btn-bake" onclick="bakeImageIntoCode()">🔒 इस फोटो ko code mein hamesha ke liye lock karein</button>
    </div>

    <!-- MAIN GENERATOR APP (Hidden until image is loaded/baked) -->
    <div id="mainApp" class="hidden">
        <!-- Guest Name Input -->
        <div class="input-group">
            <label for="nameInput">अतिथि का नाम दर्ज करें (हिंदी में):</label>
            <input type="text" id="nameInput" placeholder="जैसे: श्री राजेश कुमार शर्मा" value="श्री राजेश कुमार शर्मा">
        </div>

        <!-- Sapariwar Toggle -->
        <div class="toggle-group" onclick="toggleCheckbox(event)">
            <input type="checkbox" id="sapariwarToggle">
            <label for="sapariwarToggle" style="cursor:pointer;">सपरिवार जोड़ना है</label>
        </div>

        <!-- Sliders -->
        <div class="controls-grid">
            <div class="control-item">
                <label for="posX">नाम की X स्थिति (दाएँ/बाएँ)</label>
                <input type="range" id="posX" min="0" max="1500" value="135">
            </div>
            <div class="control-item">
                <label for="posY">नाम की Y position (ऊपर/नीचे)</label>
                <input type="range" id="posY" min="0" max="1500" value="100">
            </div>
            <div class="control-item">
                <label for="fontSize">अक्षर का आकार (Font Size)</label>
                <input type="range" id="fontSize" min="10" max="100" value="30">
            </div>
        </div>

        <!-- Canvas Preview -->
        <div class="preview-container">
            <canvas id="shokPatraCanvas"></canvas>
        </div>

        <!-- Actions -->
        <div class="action-buttons">
            <button class="btn btn-download" onclick="downloadImage()">
                📥 गैलरी में सहेजें
            </button>
            <button class="btn btn-whatsapp" onclick="shareOnWhatsApp()">
                💬 व्हाट्सएप पर भेजें
            </button>
        </div>
    </div>
</div>

<script>
    // -------------------------------------------------------------------------
    // MASTER IMAGE STORAGE (Iske andar aapki photo ka permanent data automatic save hoga)
    const PERMANENT_IMAGE_DATA = "EMPTY_DATA"; 
    // -------------------------------------------------------------------------

    const canvas = document.getElementById('shokPatraCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('nameInput');
    const sapariwarToggle = document.getElementById('sapariwarToggle');
    const posXSlider = document.getElementById('posX');
    const posYSlider = document.getElementById('posY');
    const fontSizeSlider = document.getElementById('fontSize');
    
    const setupWizard = document.getElementById('setupWizard');
    const mainApp = document.getElementById('mainApp');
    const imageBakerInput = document.getElementById('imageBakerInput');
    const bakeBtn = document.getElementById('bakeBtn');

    let loadedBase64 = "";
    const img = new Image();

    // Check if image is already baked in or not
    window.onload = function() {
        if (PERMANENT_IMAGE_DATA !== "EMPTY_DATA") {
            setupWizard.style.display = "none";
            mainApp.classList.remove('hidden');
            img.src = PERMANENT_IMAGE_DATA;
        }
    };

    // Handle manual upload during setup wizard
    imageBakerInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                loadedBase64 = event.target.result;
                img.src = loadedBase64;
                bakeBtn.style.display = "block";
                
                // Show temporary preview inside application
                mainApp.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
    });

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        posXSlider.max = img.width;
        posYSlider.max = img.height;
        draw();
    };

    // The Magic Function: Bakes image into HTML code and downloads it
    function bakeImageIntoCode() {
        if(!loadedBase64) return;
        
        // Fetch whole page source HTML code
        let currentHtml = document.documentElement.outerHTML;
        
        // Inject the permanent Base64 string directly inside the code securely
        const oldString = 'const PERMANENT_IMAGE_DATA = "EMPTY_DATA";';
        const newString = `const PERMANENT_IMAGE_DATA = "${loadedBase64}";`;
        
        let newHtml = currentHtml.replace(oldString, newString);
        
        // Clean up the setup wizard UI block completely from the newly generated file
        newHtml = "<!DOCTYPE html>\n" + newHtml;

        // Trigger safe file download
        const blob = new Blob([newHtml], { type: "text/html" });
        const link = document.createElement("a");
        link.download = "index.html";
        link.href = URL.createObjectURL(blob);
        link.click();
        
        alert("बधाई हो! आपकी इमेज कोड में लॉक हो चुकी है। अब डाउनलोड हुई 'index.html' फाइल का कोड अपने GitHub में पेस्ट कर दें। उसके बाद यह सेटअप बॉक्स हमेशा के लिए गायब हो जायेगा!");
    }

    function toggleCheckbox(e) {
        if(e.target.id !== 'sapariwarToggle') {
            sapariwarToggle.checked = !sapariwarToggle.checked;
            draw();
        }
    }

    nameInput.addEventListener('input', draw);
    sapariwarToggle.addEventListener('change', draw);
    posXSlider.addEventListener('input', draw);
    posYSlider.addEventListener('input', draw);
    fontSizeSlider.addEventListener('input', draw);

    function draw() {
        if (!img.complete) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        const name = nameInput.value;
        const x = parseInt(posXSlider.value);
        const y = parseInt(posYSlider.value);
        const size = parseInt(fontSizeSlider.value);

        // Print Guest Name
        ctx.font = `bold ${size}px "Times New Roman", Georgia, serif`;
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'left';
        ctx.fillText(name, x, y);

        // Print 'सपरिवार' strictly on the right side of the guest name row
        if (sapariwarToggle.checked) {
            const sapariwarX = canvas.width - 50; 
            const sapariwarY = y; 

            ctx.font = `bold ${size - 2}px "Times New Roman", Georgia, serif`;
            ctx.fillStyle = '#000000';
            ctx.textBaseline = 'bottom';
            ctx.textAlign = 'right'; 
            ctx.fillText("सपरिवार", sapariwarX, sapariwarY);
            ctx.textAlign = 'left';  
        }
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `shok_patra_${nameInput.value.replace(/\s+/g, '_')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    async function shareOnWhatsApp() {
        draw();
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const file = new File([blob], "shok_patra.png", { type: "image/png" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'शोक पत्र आमंत्रण',
                        text: `${nameInput.value} के लिए शोक पत्र`
                    });
                } catch (error) {
                    if (error.name !== 'AbortError') alert("Error: " + error.message);
                }
            } else {
                downloadImage();
                window.open('https://web.whatsapp.com/', '_blank');
            }
        }, 'image/png');
    }
</script>

</body>
</html>
